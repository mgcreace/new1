<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Open Booster</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="../webapp.css">
</head>
<body>
<header>
<div id="profile">
<img id="avatar" alt="avatar">
<span id="username"></span>
<span id="premiumBadge" class="badge" style="display:none;">PREMIUM</span>
</div>
<nav class="topnav">
<a href="../home/" data-page="home">Home</a>
<a href="../shop/" data-page="shop">Shop</a>
<a href="../inventory/" data-page="inventory">Inventory</a>
<a href="../openbooster/" data-page="openbooster">Open</a>
<a href="../trading/" data-page="trading">Trade</a>
<a href="../account/" data-page="account">Account</a>
</nav>
</header>

<main class="open-screen">
<section class="open-hero">
<p class="eyebrow">Booster Lab</p>
<h1>Booster oeffnen</h1>
<p class="hint">12 Karten pro Pack: 9 Normal, 1 garantierte Rare und 2 Bonus-Slots.</p>
<div class="inventory-summary-row">
<span id="telegramID"></span>
<span id="status">Loading...</span>
<span id="coins">Coins: 0</span>
</div>
</section>

<section class="open-stage-panel">
<h2>Bereit zum Oeffnen</h2>
<div id="openReward"></div>
<div id="openBoosterList" class="inventory-list"></div>
</section>

<section class="open-stage-panel">
<h2>Letzter Reveal</h2>
<div id="openedCardsList" class="card-reveal-grid open-reveal-grid"></div>
</section>

<section class="open-stage-panel">
<h2>Dein Inventar</h2>
<div id="inventoryList" class="inventory-list"></div>
</section>

<section class="open-stage-panel">
<h2>Deine Karten</h2>
<div id="cardInventoryList" class="inventory-list profile-card-grid"></div>
</section>

<section class="open-stage-panel">
<h2>Letzte Oeffnungen</h2>
<div id="openHistoryList" class="history-list"></div>
</section>
</main>

<script src="../webapp.js"></script>
<script>
initTelegramApp("openbooster");
</script>
</body>
</html>
