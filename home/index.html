<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Home</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="../webapp.css">
</head>
<body>
<header>
<div id="profile">
<img id="avatar" alt="avatar">
<span id="username"></span>
<span id="premiumBadge" class="badge" style="display:none;">PREMIUM</span>
</div>
<nav class="topnav">
<a href="../home/" data-page="home">Home</a>
<a href="../shop/" data-page="shop">Shop</a>
<a href="../inventory/" data-page="inventory">Inventory</a>
<a href="../openbooster/" data-page="openbooster">Open</a>
<a href="../trading/" data-page="trading">Trade</a>
<a href="../account/" data-page="account">Account</a>
</nav>
</header>

<main>
<h1>Dashboard</h1>
<div class="card">
<p id="telegramID"></p>
<p id="status">Loading...</p>
<p id="coins">Coins: 0</p>
</div>

<div class="card">
<h2>Sammlungs-Stats</h2>
<div id="dashboardStats" class="stats-grid"></div>
</div>

<div class="card">
<h2>Rarity Uebersicht</h2>
<div id="rarityStats" class="stats-grid"></div>
</div>

<div class="card">
<h2>Schnellzugriff</h2>
<div class="grid">
<a class="shop-btn quick-link-btn" href="../shop/">Booster kaufen<small>Direkt in den Shop</small></a>
<a class="shop-btn quick-link-btn" href="../openbooster/">Booster oeffnen<small>Letzten Pull starten</small></a>
<a class="shop-btn quick-link-btn" href="../inventory/">Inventar<small>Sammlung ansehen</small></a>
<a class="shop-btn quick-link-btn" href="../trading/">Trading<small>Trades erstellen</small></a>
</div>
</div>

<div class="card">
<h2>Letzte Aktivitaet</h2>
<div id="recentActivity" class="activity-grid"></div>
</div>

<div class="card">
<h2>Trade Uebersicht</h2>
<div id="tradeSummary" class="stats-grid"></div>
</div>
</main>

<script src="../webapp.js"></script>
<script>
initTelegramApp("home");
</script>
</body>
</html>
