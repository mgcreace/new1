<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Account</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="../webapp.css">
</head>
<body>
<header>
<div id="profile">
<img id="avatar" alt="avatar">
<span id="username"></span>
<span id="premiumBadge" class="badge" style="display:none;">PREMIUM</span>
</div>
<nav class="topnav">
<a href="../home/" data-page="home">Home</a>
<a href="../shop/" data-page="shop">Shop</a>
<a href="../inventory/" data-page="inventory">Inventory</a>
<a href="../openbooster/" data-page="openbooster">Open</a>
<a href="../trading/" data-page="trading">Trade</a>
<a href="../account/" data-page="account">Account</a>
</nav>
</header>

<main>
<h1>Account</h1>
<div class="card">
<p id="telegramID"></p>
<p id="status">Loading...</p>
<p id="coins">Coins: 0</p>
</div>

<div class="card">
<h2>Profil</h2>
<p class="stat">Name: <span id="accountName">-</span></p>
<p class="stat">Telegram ID: <span id="accountId">-</span></p>
</div>

<div class="card">
<h2>Profil bearbeiten</h2>
<form id="profileForm">
<p class="stat">Display Name</p>
<input id="displayName" style="width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:white;">

<p class="stat">Bio</p>
<textarea id="bio" rows="4" style="width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:white;"></textarea>

<p class="stat">Inventar Sichtbarkeit</p>
<select id="inventoryVisibility" style="width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:white;">
<option value="public">public</option>
<option value="private">private</option>
</select>

<p class="stat">Lieblingskarte</p>
<select id="favoriteCardId" style="width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:white;"></select>

<p class="stat">
<label>
<input type="checkbox" id="tradingEnabled">
 Trading aktivieren
</label>
</p>

<button id="saveProfileButton" class="shop-btn" type="submit">Profil speichern<small>Privacy und Profil aktualisieren</small></button>
</form>
</div>

<div class="card">
<h2>Profil Status</h2>
<div id="profileSummary" class="inventory-list"></div>
</div>

<div class="card">
<h2>Deine Karten</h2>
<div id="cardInventoryList" class="inventory-list"></div>
</div>
</main>

<script src="../webapp.js"></script>
<script>
initTelegramApp("account");
</script>
</body>
</html>
