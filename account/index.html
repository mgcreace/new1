<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Account</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="../webapp.css">
</head>
<body>
<header>
<div id="profile">
<img id="avatar" alt="avatar">
<span id="username"></span>
<span id="premiumBadge" class="badge" style="display:none;">PREMIUM</span>
</div>
<nav class="topnav">
<a href="../home/" data-page="home">Home</a>
<a href="../shop/" data-page="shop">Shop</a>
<a href="../inventory/" data-page="inventory">Inventory</a>
<a href="../account/" data-page="account">Account</a>
</nav>
</header>

<main>
<h1>Account</h1>
<div class="card">
<p id="telegramID"></p>
<p id="status">Loading...</p>
<p id="coins">Coins: 0</p>
</div>

<div class="card">
<h2>Profil</h2>
<p class="stat">Name: <span id="accountName">-</span></p>
<p class="stat">Telegram ID: <span id="accountId">-</span></p>
</div>
</main>

<script src="../webapp.js"></script>
<script>
initTelegramApp("account").then(() => {
    if (window.__tgApp && window.__tgApp.user) {
        document.getElementById("accountName").innerText = window.__tgApp.user.first_name || "User";
        document.getElementById("accountId").innerText = window.__tgApp.user.id;
    }
});
</script>
</body>
</html>
