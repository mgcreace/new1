<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Account</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="../webapp.css">
</head>
<body>
<header>
<div id="profile">
<img id="avatar" alt="avatar">
<span id="username"></span>
<span id="premiumBadge" class="badge" style="display:none;">PREMIUM</span>
</div>
<nav class="topnav">
<a href="../home/" data-page="home">Home</a>
<a href="../shop/" data-page="shop">Shop</a>
<a href="../inventory/" data-page="inventory">Inventory</a>
<a href="../openbooster/" data-page="openbooster">Open</a>
<a href="../trading/" data-page="trading">Trade</a>
<a href="../account/" data-page="account">Account</a>
</nav>
</header>

<main class="account-screen">
<section class="profile-hero">
<div class="profile-actions">
<span class="profile-action-icon profile-add-icon" aria-hidden="true"></span>
<span class="profile-action-icon profile-menu-icon" aria-hidden="true"></span>
</div>

<div class="profile-avatar-wrap">
<img id="accountAvatar" class="profile-avatar" alt="avatar">
<span class="profile-avatar-plus">+</span>
</div>

<h1 id="accountProfileName">Account</h1>
<p id="accountHandle" class="profile-handle">@user</p>
<p id="telegramID" class="profile-id"></p>

<div class="profile-stats">
<div>
<strong id="accountCoins">0</strong>
<span>Coins</span>
</div>
<div>
<strong id="accountCards">0</strong>
<span>Karten</span>
</div>
<div>
<strong id="accountBoosters">0</strong>
<span>Booster</span>
</div>
</div>

<p id="accountBioText" class="profile-bio">Baue dein Deck, oeffne Booster und trade mit anderen Spielern.</p>

<div class="profile-pill-row">
<span id="status" class="profile-pill">Loading...</span>
<span id="accountTradingStatus" class="profile-pill">Trading laden</span>
<span id="accountVisibilityStatus" class="profile-pill">Inventar laden</span>
</div>
</section>

<section class="profile-tabs">
<a href="#profileForm" class="profile-tab active">Bearbeiten</a>
<a href="#profileSummary" class="profile-tab">Status</a>
<a href="#cardInventoryList" class="profile-tab">Karten</a>
</section>

<section class="profile-edit-panel">
<h2>Profil bearbeiten</h2>
<form id="profileForm">
<label class="form-label" for="displayName">Display Name</label>
<input id="displayName" class="form-control">

<label class="form-label" for="bio">Bio</label>
<textarea id="bio" class="form-control" rows="4"></textarea>

<label class="form-label" for="inventoryVisibility">Inventar Sichtbarkeit</label>
<select id="inventoryVisibility" class="form-control">
<option value="public">public</option>
<option value="private">private</option>
</select>

<label class="form-label" for="favoriteCardId">Lieblingskarte</label>
<select id="favoriteCardId" class="form-control"></select>

<label class="toggle-row">
<input type="checkbox" id="tradingEnabled">
<span>Trading aktivieren</span>
</label>

<button id="saveProfileButton" class="shop-btn" type="submit">Profil speichern<small>Privacy und Profil aktualisieren</small></button>
</form>
</section>

<section class="profile-panel">
<h2>Profil Status</h2>
<div id="profileSummary" class="inventory-list"></div>
</section>

<section class="profile-panel">
<h2>Deine Karten</h2>
<div id="cardInventoryList" class="inventory-list"></div>
</section>
</main>

<script src="../webapp.js"></script>
<script>
initTelegramApp("account");
</script>
</body>
</html>
