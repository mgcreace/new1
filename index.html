<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Web App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    height:70px;
    background:#020617;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding-right:20px;
}

#profile{
    display:flex;
    align-items:center;
}

#avatar{
    width:45px;
    height:45px;
    border-radius:50%;
}

main{
    padding:40px;
    text-align:center;
}

#blocked{
    display:none;
    font-size:26px;
    color:red;
    margin-top:120px;
}

#dashboard{
    display:none;
}

.badge{
    background:gold;
    color:black;
    padding:6px 12px;
    border-radius:10px;
    margin-left:10px;
}

</style>
</head>

<body>


<div id="blocked">
⚠️ Open in Telegram
</div>


<div id="dashboard">

<header>

<div id="profile">

<img id="avatar">

<span id="username"></span>

<span id="premiumBadge" class="badge" style="display:none;">
PREMIUM
</span>

</div>

</header>


<main>

<h1>Dashboard</h1>

<p id="telegramID"></p>

<p id="premiumStatus">Checking premium... ⏳</p>

</main>

</div>


<script>

let tg = window.Telegram.WebApp;
tg.expand();


// ❌ BLOCK IF NOT TELEGRAM
if(!tg.initDataUnsafe || !tg.initDataUnsafe.user){

document.getElementById("blocked").style.display="block";

}else{


let user = tg.initDataUnsafe.user;


// UI SHOW
document.getElementById("dashboard").style.display="block";

document.getElementById("username").innerText =
user.first_name + " " + (user.last_name || "");

document.getElementById("avatar").src =
user.photo_url || "https://via.placeholder.com/45";

document.getElementById("telegramID").innerText =
"Telegram ID: " + user.id;


// 🔐 SECURE BACKEND CHECK
document.getElementById("premiumStatus").innerText =
"Checking premium... ⏳";

fetch("http://193.34.69.85:8000/secure-check", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        initData: tg.initData,
        user_id: user.id
    })
})
.then(res => res.json())
.then(data => {

    if(data.error){
        document.getElementById("premiumStatus").innerText =
        "Security check failed ❌";
        return;
    }

    if(data.premium){
        document.getElementById("premiumStatus").innerText =
        "Premium aktiv ✅";
        document.getElementById("premiumBadge").style.display = "inline-block";
    } else {
        document.getElementById("premiumStatus").innerText =
        "Kein Premium ❌";
    }

})
.catch(() => {
    document.getElementById("premiumStatus").innerText =
    "Backend offline ❌";
});

}

</script>

</body>
</html>
