<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mail</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="../webapp.css">
</head>
<body>
<header>
<div id="profile">
<img id="avatar" alt="avatar">
<span id="username"></span>
<span id="premiumBadge" class="badge" style="display:none;">PREMIUM</span>
</div>
<nav class="topnav">
<a href="../home/" data-page="home">Home</a>
<a href="../shop/" data-page="shop">Shop</a>
<a href="../inventory/" data-page="inventory">Inventory</a>
<a href="../openbooster/" data-page="openbooster">Open</a>
<a href="../trading/" data-page="trading">Trade</a>
<a href="../mail/" data-page="mail">Mail</a>
<a href="../account/" data-page="account">Account</a>
</nav>
</header>

<main class="mail-screen">
<section class="mail-hero">
<p class="eyebrow">Inbox</p>
<h1>Mail</h1>
<p class="hint">Hier landen deine Trade-Angebote. Spaeter koennen hier Nachrichten, Rewards und System-Mails rein.</p>
<div class="inventory-summary-row">
<span id="telegramID"></span>
<span id="status">Loading...</span>
<span id="coins">Coins: 0</span>
</div>
<div id="mailNotice" class="trade-notice" style="display:none;"></div>
</section>

<section class="mail-panel">
<div class="mail-panel-head">
<h2>Trade Inbox</h2>
<span id="mailTradeCount">0</span>
</div>
<div class="mail-filter-row">
<button type="button" class="mail-filter active" data-mail-filter="incoming">Eingehend</button>
<button type="button" class="mail-filter" data-mail-filter="outgoing">Gesendet</button>
<button type="button" class="mail-filter" data-mail-filter="done">Erledigt</button>
</div>
<div id="mailTradeOffersList" class="history-list"></div>
</section>

<section class="mail-panel">
<h2>Mail Status</h2>
<div id="tradeFeedback" class="inventory-item trade-feedback-box">Trade-Aktionen erscheinen hier mit Feedback.</div>
</section>
</main>

<script src="../webapp.js"></script>
<script>
initTelegramApp("mail");
</script>
</body>
</html>
